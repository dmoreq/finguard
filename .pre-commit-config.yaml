repos:
  # ── General file hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of file
        exclude: |
          (?x)^(
            frontend/tsconfig\.tsbuildinfo
          )
      - id: detect-private-key
        name: detect private keys
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-json
        name: validate JSON
      - id: check-yaml
        name: validate YAML
      - id: check-toml
        name: validate TOML

  # ── Security: Secret detection ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks secret detection

  # ── Python linting and formatting ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
        files: ^backend/.*\.py$
        exclude: ^backend/.venv/
      - id: ruff-format
        name: ruff format
        files: ^backend/.*\.py$
        exclude: ^backend/.venv/

  # ── Python type checking ──
  - repo: local
    hooks:
      - id: pyright
        name: pyright type check
        entry: bash -c 'cd backend && npx -y pyright'
        language: system
        files: ^backend/actions/.*\.py$
        exclude: ^backend/.venv/
        pass_filenames: false

  # ── Python security scanning ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: bandit security check
        args: [-r, backend/actions, --severity-level=medium]
        files: ^backend/actions/.*\.py$
        exclude: ^backend/.venv/

  # ── Python dependency auditing (optional - install with: pip install pip-audit) ──
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit dependency check
        entry: bash -c 'cd backend && python -m pip_audit.cli audit --version >/dev/null 2>&1 && python -m pip_audit.cli audit || echo "Skipping pip-audit (not installed)"'
        language: system
        files: ^backend/(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [manual]

  # ── Node dependency auditing ──
  - repo: local
    hooks:
      - id: npm-audit
        name: npm-audit dependency check
        entry: bash -c 'cd frontend && npm audit --audit-level=moderate 2>/dev/null || pnpm audit --audit-level=moderate 2>/dev/null || true'
        language: system
        files: ^frontend/(package\.json|pnpm-lock\.yaml)$
        pass_filenames: false

  # ── TypeScript/JavaScript frontend tools ──
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bash -c 'cd frontend && ./node_modules/.bin/biome check src'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: tsc
        name: tsc type check
        entry: bash -c 'if [ -d frontend ]; then cd frontend && pnpm exec tsc --noEmit || true; fi'
        language: system
        files: ^frontend/src/.*\.tsx?$
        pass_filenames: false

  # ── Spell checking ──
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        name: codespell spell check
        args: [--ignore-words-list=coba,adapteur]
        exclude: |
          (?x)^(
            node_modules|
            \.git|
            \.venv|
            dist|
            build|
            backend/uv\.lock|
            frontend/pnpm-lock\.yaml|
            frontend/\.pi|
            frontend/tsconfig\.tsbuildinfo
          )

  # ── Commit message validation ──
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
      - id: commitizen
        name: commitizen check
        stages: [commit-msg]

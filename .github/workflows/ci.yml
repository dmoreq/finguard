name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check actions tests
      - run: uv run pyright
      - run: uv run pytest tests/ -q

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify archived Supabase migration files
        run: |
          set -euo pipefail
          count=$(find docs/archive/supabase/migrations -name '*.sql' | wc -l | tr -d ' ')
          test "$count" -ge 3
          for f in docs/archive/supabase/migrations/*.sql; do
            test -s "$f"
            echo "OK $(basename "$f")"
          done

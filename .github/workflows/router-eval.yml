name: Router eval (hybrid)

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  hybrid-router:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Cache FastEmbed model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: fastembed-${{ runner.os }}-v1
          restore-keys: |
            fastembed-${{ runner.os }}-

      - name: Evaluate hybrid router accuracy
        working-directory: backend
        env:
          ROUTER_MODE: hybrid
        run: uv run python scripts/spike_router.py

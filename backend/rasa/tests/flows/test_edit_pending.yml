stub_custom_actions:
  action_update_transaction:
    events:
      - event: slot
        name: confirmation_pending
        value: false
    responses:
      - text: "Updated pending transaction."

test_cases:
  - test_case: edit pending transaction amount
    fixtures:
      - pending_transaction
    steps:
      - user: "change the amount to $60"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - edit_pending_transaction
          - action_executed: action_update_transaction

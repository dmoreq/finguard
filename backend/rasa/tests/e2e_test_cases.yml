# E2E tests for Finguard CALM flows.
# Run inside Rasa container: rasa test e2e tests/
# Stub custom actions when RASA_PRO_BETA_STUB_CUSTOM_ACTION=true

stub_custom_actions:
  action_session_start:
    events:
      - event: slot
        name: user_id
        value: "test-user-001"
      - event: slot
        name: user_currency
        value: "USD"
      - event: slot
        name: user_timezone
        value: "UTC"
      - event: slot
        name: confirmation_pending
        value: false

  action_record_transaction:
    events:
      - event: slot
        name: last_transaction_id
        value: "tx-pending-001"
      - event: slot
        name: confirmation_pending
        value: true
    responses:
      - custom:
          type: transaction_pending
          text: "Got it — $45.00 for Groceries on May 27. Confirm or edit?"

  action_update_transaction:
    events:
      - event: slot
        name: confirmation_pending
        value: false
      - event: slot
        name: last_transaction_id
        value: null
    responses:
      - text: "Saved — $45.00 for Groceries on May 27. ✓"

  action_delete_transaction:
    events:
      - event: slot
        name: confirmation_pending
        value: false
      - event: slot
        name: last_transaction_id
        value: null
    responses:
      - text: "Transaction discarded. ✓"

  action_query_spending:
    responses:
      - text: "You spent $500.00 this month across 3 categories."

  action_get_balance:
    responses:
      - text: "Income: $3,200.00 | Expenses: $500.00 | Net: $2,700.00"

  action_list_transactions:
    responses:
      - text: "**Recent transactions:**\n  − $45.00 — Groceries on today ✓"

test_cases:
  - test_case: record expense happy path
    steps:
      - user: "I spent $45 on groceries yesterday"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - record_expense
          - action_executed: action_record_transaction

  - test_case: confirm pending transaction
    fixtures:
      - pending_transaction
    steps:
      - user: "yes, confirm it"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - confirm_pending_transaction
          - action_executed: action_update_transaction

  - test_case: discard pending transaction
    fixtures:
      - pending_transaction
    steps:
      - user: "discard that"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - discard_pending_transaction
          - action_executed: action_delete_transaction

  - test_case: query spending report
    steps:
      - user: "how much did I spend last month?"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - query_spending_report
          - action_executed: action_query_spending

  - test_case: confirm with nothing pending
    fixtures:
      - no_pending_transaction
    steps:
      - user: "confirm"
        assertions:
          - flow_started:
              operator: "all"
              flow_ids:
                - no_pending_transaction
          - bot_uttered:
              utter_name: utter_no_pending_transaction

flows:
  record_expense:
    description: >
      Record an expense (money spent). Use when user mentions paying for something,
      buying something, or spending money. Examples: "spent $45 on groceries",
      "paid $12 for coffee", "grocery shopping was $80"
    persisted_slots:
      - last_transaction_id
      - confirmation_pending
    steps:
      - collect: amount
        description: The amount spent as a number (e.g. 45, 12.50)
        rejections:
          - if: "slots.amount <= 0"
            utter: utter_ask_amount

      - collect: category
        description: >
          Spending category. Common categories: groceries, dining, transport,
          health, entertainment, utilities, shopping, travel, education, bills
        rejections:
          - if: "not slots.category"
            utter: utter_ask_category

      - collect: description
        description: >
          Short description of what was purchased or spent on (optional).
          Ask permission before filling if not mentioned.
        ask_before_filling: false

      - collect: transaction_date
        description: >
          Date of the expense. Can be relative: "today", "yesterday",
          "last Tuesday". If not mentioned, defaults to today.
        ask_before_filling: false

      - action: action_record_transaction
        metadata:
          transaction_type: expense

  record_income:
    description: >
      Record income (money received). Use when user mentions getting paid,
      receiving money, a salary, freelance payment, or other income source.
      Examples: "got paid $2000", "freelance project $500", "bonus $300"
    persisted_slots:
      - last_transaction_id
      - confirmation_pending
    steps:
      - collect: amount
        description: The income amount as a number

      - collect: category
        description: >
          Income source category. Common: salary, freelance, investment,
          gift, bonus, refund, dividend, interest

      - collect: description
        description: >
          Description of the income source (optional).
          Ask permission before filling if not mentioned.
        ask_before_filling: false

      - collect: transaction_date
        description: When the income was received
        ask_before_filling: false

      - action: action_record_transaction
        metadata:
          transaction_type: income

flows:
  query_spending_report:
    description: >
      Show spending summary, report, or breakdown by category.
      Use when user asks how much they spent, wants a summary, category breakdown,
      or spending analysis. Examples: "how much did I spend last month?",
      "show my grocery spending", "what are my biggest expenses?"

    steps:
      - collect: query_period
        description: >
          Time period for the report. Options: this_month (default),
          last_month, last_7d, last_30d, last_3m, ytd (year to date).
          If not mentioned, defaults to this_month.
        ask_before_filling: false

      - collect: query_category
        description: >
          Specific category to filter by (optional, leave empty for all categories).
          If the user asks about a specific category, extract it here.
        ask_before_filling: false

      - action: action_query_spending

  get_balance:
    description: >
      Show current balance, total income vs expenses, or net worth summary.
      Use when user asks about their balance, financial status, net total,
      or how much they earned vs spent. Examples: "what's my balance?",
      "how much did I earn this month?", "show my income vs expenses"

    steps:
      - collect: query_period
        description: >
          Time period for balance. Defaults to this_month if not mentioned.
        ask_before_filling: false

      - action: action_get_balance

  list_recent_transactions:
    description: >
      List recent transactions. Use when user wants to see their transaction
      history, recent entries, what they recorded, or review past transactions.
      Examples: "show recent transactions", "what did I record?",
      "my transaction history"

    steps:
      - collect: query_period
        description: >
          Time period filter (optional). Defaults to last 30 days if not mentioned.
        ask_before_filling: false

      - collect: query_category
        description: >
          Category filter (optional, leave empty for all categories).
        ask_before_filling: false

      - action: action_list_transactions

# Lite local: action server on host (scripts/dev-lite.sh). Docker Rasa reaches it via host.docker.internal.
action_endpoint:
  url: "http://host.docker.internal:5055/webhook"

# Tracker store — in-memory for development, Redis for production
tracker_store:
  type: InMemoryTrackerStore
  # For production multi-instance, switch to:
  # type: RedisTrackerStore
  # host: redis
  # port: 6379
  # db: 0
  # key_prefix: rasa_tracker

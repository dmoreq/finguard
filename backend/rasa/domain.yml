version: "3.1"

session_config:
  session_expiration_time: 60      # minutes
  carry_over_slots_to_new_session: false

slots:
  # ─── User Context (injected by action_session_start) ─────────────
  user_id:
    type: text
    mappings: [{ type: custom }]

  user_display_name:
    type: text
    mappings: [{ type: custom }]

  user_currency:
    type: text
    initial_value: "USD"
    mappings: [{ type: custom }]

  user_timezone:
    type: text
    initial_value: "UTC"
    mappings: [{ type: custom }]

  # ─── Transaction Collection Slots ───────────────────────────────
  amount:
    type: float
    mappings: [{ type: from_llm }]

  category:
    type: text
    mappings: [{ type: from_llm }]

  description:
    type: text
    mappings: [{ type: from_llm }]

  transaction_date:
    type: text                      # ISO string or relative: "yesterday", "last Tuesday"
    mappings: [{ type: from_llm }]

  transaction_type:
    type: categorical
    values: ["income", "expense", "pending"]
    mappings: [{ type: from_llm }]

  ai_confidence:
    type: float
    mappings: [{ type: from_llm }]

  # ─── Query/Report Slots ─────────────────────────────────────────
  query_period:
    type: text
    # Values: this_month, last_month, last_7d, last_30d, last_3m, ytd
    mappings: [{ type: from_llm }]

  query_category:
    type: text
    mappings: [{ type: from_llm }]

  # ─── State Slots ─────────────────────────────────────────────────
  last_transaction_id:
    type: text
    mappings: [{ type: custom }]

  confirmation_pending:
    type: bool
    mappings: [{ type: custom }]

responses:
  # ─── Slot Collection Questions ──────────────────────────────────
  utter_ask_amount:
    - text: "How much was it?"

  utter_ask_category:
    - text: "What category? (e.g. groceries, dining, transport, health, utilities)"

  utter_ask_description:
    - text: "Any note for this transaction? (or say 'skip')"

  utter_ask_transaction_date:
    - text: "When was this? (today, yesterday, or a specific date)"

  # ─── Default Responses ──────────────────────────────────────────
  utter_clarify_failed:
    - text: "I didn't quite get that. Could you rephrase? For example: 'spent $45 on groceries' or 'how much did I spend last month?'"

  utter_default:
    - text: "I'm here to help with your finances. You can tell me about transactions or ask for spending summaries."

  utter_welcome:
    - text: "Welcome! I'm Finguard, your AI financial assistant. What would you like to do?"

  utter_no_pending_transaction:
    - text: "There's no transaction waiting to confirm. Tell me about a new expense or income to record one."

actions:
  - action_session_start
  - action_record_transaction
  - action_query_spending
  - action_get_balance
  - action_list_transactions
  - action_delete_transaction
  - action_update_transaction

# Rasa CALM Configuration
# LLM-powered command generation with LiteLLM routing

recipe: default.v1
language: en

pipeline:
  # CALM uses LLM to generate commands from user messages
  - name: SingleStepLLMCommandGenerator
    llm:
      provider: openai              # LiteLLM uses OpenAI-compatible API
      model: finguard-primary       # Model alias from litellm/config.yaml
      api_base: "http://host.docker.internal:4000"
      api_key: ${LITELLM_MASTER_KEY}
      temperature: 0.1              # Low temp = deterministic slot filling
      max_tokens: 256               # Commands are short
    max_history: 10                 # Use last 10 turns for context

policies:
  # Executes the matched flow
  - name: FlowPolicy

  # Routes user message to appropriate flow using LLM
  - name: LLMBasedRouter
    llm:
      provider: openai
      model: finguard-primary
      api_base: "http://host.docker.internal:4000"
      api_key: ${LITELLM_MASTER_KEY}
      temperature: 0.0              # Deterministic routing
      max_tokens: 128

  # Fallback for rule-based edge cases
  - name: RulePolicy

assistant:
  text_messages: []

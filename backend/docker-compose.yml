# Lite local: only Rasa in Docker. Actions + LiteLLM run on the host (see scripts/dev-lite.sh).
services:
  rasa:
    image: rasa/rasa-pro:3.9.20
    volumes:
      - ./rasa:/app
      - rasa-models:/app/models
    ports:
      - "5005:5005"
    environment:
      - RASA_PRO_LICENSE=${RASA_PRO_LICENSE}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ENV=${ENV:-development}
    command: >
      run
      --enable-api
      --cors "*"
      --port 5005
      --endpoints /app/endpoints.yml
      --credentials /app/credentials.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  rasa-models:
